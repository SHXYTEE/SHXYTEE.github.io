title = "ON OAK"
date = "2026-04-10"
body = """
Oak is a small, dynamic language with a pleasantly weird syntax.
Strings are mutable byte buffers. The '<<' operator means push,
append, or shift, depending on what is to its left. Pattern matching
is an if-expression. Functions are first class and tail calls are
free.

What surprised me most is how quickly a handful of primitives start
to feel like a full toolbox. 'with' desugars callbacks into straight
lines. '|>' turns nested calls into pipelines. 'cs' gives you just
enough class sugar to model objects without dragging a type system
along for the ride.
"""
